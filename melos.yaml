name: app_library

packages:
  - packages/**
  - apps/**

sdkPath: auto

command:
  bootstrap:
    runPubGetInParallel: true

scripts:
  analyze:
    run: melos exec -- dart analyze
    description: Analyze all packages

  test:
    run: melos exec -- flutter test
    description: Run tests in all packages

  test:dart:
    run: melos exec -- dart test
    description: Run dart tests (for pure Dart packages)
    packageFilters:
      noDependsOn: flutter

  build_runner:
    run: melos exec -- dart run build_runner build --delete-conflicting-outputs
    description: Run build_runner in packages that use it
    packageFilters:
      dependsOn: build_runner

  format:
    run: melos exec -- dart format lib
    description: Format all packages

  clean:
    run: melos exec -- flutter clean
    description: Clean all packages

  verify-safe:
    run: melos exec --scope="showcase,pet_life,blacklabelled" -- dart analyze
    description: Verify all apps compile after package changes (Step 5)

  verify-package:
    run: melos exec --scope="$MELOS_SCOPE" -- dart analyze && melos exec --scope="$MELOS_SCOPE" -- flutter test
    description: Analyze + test a specific package (Step 4)
