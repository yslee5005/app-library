name: abba
description: "Abba - Prayer & QT AI Companion"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.0
  flutter_riverpod: ^3.0.0
  flutter_dotenv: ^6.0.0
  go_router: ^15.1.2
  google_fonts: ^6.2.1
  # Shared packages
  app_lib_auth:
    path: ../../packages/auth
  app_lib_core:
    path: ../../packages/core
  app_lib_supabase_client:
    path: ../../packages/supabase_client
  google_sign_in: ^6.2.0
  # Phase 2
  supabase_flutter: ^2.8.0
  http: ^1.2.0
  just_audio: ^0.9.0
  shared_preferences: ^2.3.5
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.3
  sentry_flutter: ^9.16.0
  path_provider: ^2.1.0
  # Phase 3
  purchases_flutter: ^8.9.0
  # Phase 4
  share_plus: ^10.1.4
  url_launcher: ^6.3.0
  # Notifications
  flutter_local_notifications: ^19.0.0
  timezone: ^0.10.0
  # FCM (Push Notifications)
  firebase_core: ^3.12.0
  firebase_messaging: ^15.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

# --- flutter_launcher_icons ---
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#FFF8F0"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  min_sdk_android: 21

# --- flutter_native_splash ---
flutter_native_splash:
  color: "#FFF8F0"
  image: "assets/icon/app_icon.png"
  android_12:
    color: "#FFF8F0"
    image: "assets/icon/app_icon.png"
  ios: true
  android: true

flutter:
  generate: true
  uses-material-design: true
  assets:
    - .env.client
    - assets/mock/
    - assets/icon/
