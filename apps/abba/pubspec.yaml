name: abba
description: "Abba - Prayer & QT AI Companion"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  # Phase 2
  supabase_flutter: ^2.8.0
  http: ^1.2.0
  just_audio: ^0.9.0
  shared_preferences: ^2.3.5
  speech_to_text: ^7.0.0
  sentry_flutter: ^8.3.0
  path_provider: ^2.1.0
  # Phase 3
  purchases_flutter: ^8.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/mock/
