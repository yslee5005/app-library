name: blacklabelled
description: BlackLabelled Interior Design Studio App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI
  cached_network_image: ^3.4.1
  smooth_page_indicator: ^1.2.0+3
  url_launcher: ^6.3.1
  share_plus: ^10.1.4

  # Storage
  shared_preferences: ^2.3.5

  # Backend
  supabase_flutter: ^2.8.4

  # Environment
  flutter_dotenv: ^6.0.0

  # Fonts
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.14
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - .env.runtime

