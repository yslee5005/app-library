<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<style>
        body {
            background-color: #FFF8E1;
            color: #3E2723;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .plus-jakarta { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="min-h-screen pb-32">
<!-- TopAppBar -->
<header class="bg-[#FFF8E1] text-[#FF8A80] font-['Plus_Jakarta_Sans'] font-bold text-lg docked full-width top-0 flex items-center px-5 h-16 w-full sticky z-50">
<div class="flex items-center gap-4 w-full">
<button class="transition-transform active:scale-95 hover:bg-black/5 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-extrabold text-[#3E2723]">데이터 내보내기</h1>
</div>
</header>
<main class="px-5 mt-6 max-w-2xl mx-auto space-y-8">
<!-- Emotional Hook -->
<section class="space-y-1">
<p class="text-[#FF8A80] font-bold text-sm">우리 아이의 소중한 기록</p>
<h2 class="text-2xl font-extrabold plus-jakarta text-[#3E2723] leading-tight">성장 데이터를<br/>안전하게 간직하세요</h2>
</section>
<!-- Export Options Section (Bento Style) -->
<section class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- PDF Report - Primary Action Card -->
<button class="col-span-1 md:col-span-2 group relative overflow-hidden bg-white rounded-[12px] p-6 shadow-[0_2px_8px_rgba(62,39,35,0.08)] border-2 border-transparent hover:border-[#FF8A80] transition-all text-left">
<div class="flex justify-between items-start">
<div class="space-y-2 z-10">
<span class="inline-block px-3 py-1 bg-[#FFF1EC] text-[#FF8A80] text-xs font-bold rounded-full">인기</span>
<h3 class="text-xl font-bold text-[#3E2723]">📄 PDF 리포트</h3>
<p class="text-[#8D6E63] text-sm">성장 기록을 예쁜 PDF로 내보내요</p>
</div>
<div class="w-24 h-24 bg-surface-container-low rounded-lg overflow-hidden flex-shrink-0 shadow-inner">
<img alt="PDF Preview" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" data-alt="a minimalist baby growth report template with soft pastel colors, cute illustrations, and clean typography layouts" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAFub6zK5BE6IxE8jal2l5vxHXwsnnkehfVqNWbTPf3bTFjN8O8_qrNT80IhcDPWAufX4GovuVmIAfexEv_NbH4or_BJjb-Lgm-gnvdZiBmx5uzyam-8QYKhhgaEj5vBbaM7pR9GnVFx46CJmZEF7FuE43lU1J1LFk-QQ0MHCi-1dHtcN2j4WdJbib9voGmEX_GQRNFe2sF9MDEbtbaEbxlmZQIr3u9oQeLhXXrnpORWfb2Qf8G5sUsrRkbUJeZBB9XO0ji0hweCoy9"/>
</div>
</div>
</button>
<!-- CSV Export -->
<button class="bg-white rounded-[12px] p-5 shadow-[0_2px_8px_rgba(62,39,35,0.08)] border border-transparent hover:border-[#FF8A80]/30 transition-all text-left flex flex-col justify-between">
<div class="space-y-2">
<div class="w-10 h-10 bg-surface-container-high rounded-full flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="table_chart">table_chart</span>
</div>
<h3 class="font-bold text-[#3E2723]">📊 CSV 데이터</h3>
<p class="text-[#8D6E63] text-xs leading-relaxed">원본 데이터를 스프레드시트로 내보내요</p>
</div>
</button>
<!-- Photo Backup -->
<button class="bg-white rounded-[12px] p-5 shadow-[0_2px_8px_rgba(62,39,35,0.08)] border border-transparent hover:border-[#FF8A80]/30 transition-all text-left flex flex-col justify-between">
<div class="space-y-2">
<div class="w-10 h-10 bg-secondary-container rounded-full flex items-center justify-center text-secondary">
<span class="material-symbols-outlined" data-icon="photo_library">photo_library</span>
</div>
<h3 class="font-bold text-[#3E2723]">📸 사진 백업</h3>
<p class="text-[#8D6E63] text-xs leading-relaxed">모든 사진을 한 번에 내보내요</p>
</div>
</button>
</section>
<!-- Date Range Selector -->
<section class="space-y-4">
<h3 class="font-bold text-[#3E2723] flex items-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="calendar_today">calendar_today</span>
                기간 설정
            </h3>
<div class="flex p-1 bg-white rounded-xl shadow-sm border border-[#3E2723]/5">
<button class="flex-1 py-2.5 px-4 rounded-lg text-sm font-bold bg-[#FF8A80] text-white transition-all">전체 기간</button>
<button class="flex-1 py-2.5 px-4 rounded-lg text-sm font-medium text-[#8D6E63] hover:bg-surface-container-low transition-all">최근 1개월</button>
<button class="flex-1 py-2.5 px-4 rounded-lg text-sm font-medium text-[#8D6E63] hover:bg-surface-container-low transition-all">최근 3개월</button>
</div>
</section>
<!-- Data Categories Checklist -->
<section class="space-y-4">
<h3 class="font-bold text-[#3E2723] flex items-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="checklist">checklist</span>
                내보낼 항목
            </h3>
<div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
<label class="flex items-center gap-3 p-4 bg-white rounded-[12px] shadow-[0_2px_8px_rgba(62,39,35,0.08)] cursor-pointer active:scale-95 transition-transform">
<input checked="" class="w-5 h-5 rounded-md text-[#FF8A80] border-[#FF8A80]/30 focus:ring-[#FF8A80]" type="checkbox"/>
<span class="font-medium text-sm text-[#3E2723]">수면</span>
</label>
<label class="flex items-center gap-3 p-4 bg-white rounded-[12px] shadow-[0_2px_8px_rgba(62,39,35,0.08)] cursor-pointer active:scale-95 transition-transform">
<input checked="" class="w-5 h-5 rounded-md text-[#FF8A80] border-[#FF8A80]/30 focus:ring-[#FF8A80]" type="checkbox"/>
<span class="font-medium text-sm text-[#3E2723]">수유</span>
</label>
<label class="flex items-center gap-3 p-4 bg-white rounded-[12px] shadow-[0_2px_8px_rgba(62,39,35,0.08)] cursor-pointer active:scale-95 transition-transform">
<input checked="" class="w-5 h-5 rounded-md text-[#FF8A80] border-[#FF8A80]/30 focus:ring-[#FF8A80]" type="checkbox"/>
<span class="font-medium text-sm text-[#3E2723]">성장</span>
</label>
<label class="flex items-center gap-3 p-4 bg-white rounded-[12px] shadow-[0_2px_8px_rgba(62,39,35,0.08)] cursor-pointer active:scale-95 transition-transform">
<input checked="" class="w-5 h-5 rounded-md text-[#FF8A80] border-[#FF8A80]/30 focus:ring-[#FF8A80]" type="checkbox"/>
<span class="font-medium text-sm text-[#3E2723]">편지</span>
</label>
<label class="flex items-center gap-3 p-4 bg-white rounded-[12px] shadow-[0_2px_8px_rgba(62,39,35,0.08)] cursor-pointer active:scale-95 transition-transform">
<input checked="" class="w-5 h-5 rounded-md text-[#FF8A80] border-[#FF8A80]/30 focus:ring-[#FF8A80]" type="checkbox"/>
<span class="font-medium text-sm text-[#3E2723]">사진</span>
</label>
</div>
</section>
<!-- Privacy Footer Info -->
<div class="flex items-start gap-3 p-4 bg-sage-green/10 rounded-xl bg-[#81C784]/10 border border-[#81C784]/20">
<span class="material-symbols-outlined text-[#81C784] text-xl" data-icon="verified_user">verified_user</span>
<p class="text-xs text-[#286c34] leading-relaxed">
                데이터는 기기에만 안전하게 저장되며 외부 서버로 전송되지 않아요. 우리 아이의 개인정보는 소중하니까요!
            </p>
</div>
<!-- Main Action Button -->
<div class="pt-4">
<button class="w-full h-16 bg-[#FF8A80] text-white rounded-2xl font-bold text-lg shadow-[0_4px_12px_rgba(255,138,128,0.4)] hover:shadow-[0_6px_20px_rgba(255,138,128,0.5)] active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="download">download</span>
                데이터 내보내기
            </button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="bg-white/90 backdrop-blur-md fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-20 pb-safe px-4 rounded-t-[20px] shadow-[0_-2px_8px_rgba(62,39,35,0.08)] border-t border-[#3E2723]/5">
<button class="flex flex-col items-center justify-center text-[#8D6E63] hover:opacity-80 transition-all active:scale-90">
<span class="material-symbols-outlined" data-icon="mail">mail</span>
<span class="font-['Inter'] font-medium text-[11px]">편지</span>
</button>
<button class="flex flex-col items-center justify-center text-[#8D6E63] hover:opacity-80 transition-all active:scale-90">
<span class="material-symbols-outlined" data-icon="monitoring">monitoring</span>
<span class="font-['Inter'] font-medium text-[11px]">성장</span>
</button>
<button class="flex flex-col items-center justify-center text-[#8D6E63] hover:opacity-80 transition-all active:scale-90">
<span class="material-symbols-outlined" data-icon="groups">groups</span>
<span class="font-['Inter'] font-medium text-[11px]">커뮤니티</span>
</button>
<!-- ACTIVE: 설정 (Settings) -->
<button class="flex flex-col items-center justify-center text-[#FF8A80] font-bold hover:opacity-80 transition-all active:scale-90">
<span class="material-symbols-outlined" data-icon="settings" style="font-variation-settings: 'FILL' 1;">settings</span>
<span class="font-['Inter'] font-bold text-[11px]">설정</span>
</button>
</nav>
</body></html>
