<body class="font-body text-on-background bg-background min-h-screen">

<header class="bg-[#FFF8E1] dark:bg-stone-950 flex justify-between items-center px-5 h-16 w-full docked full-width top-0 z-40">

<span class="material-symbols-outlined text-white text-4xl mb-1" style="font-variation-settings: 'FILL' 1;">child_care</span>
<span class="text-white font-headline font-bold text-6xl">7</span>
<div class="absolute -bottom-2 bg-white/20 backdrop-blur-md px-3 py-1 rounded-full border border-white/30">

</div>

</div>

<div class="flex-1 h-3 rounded-full bg-white/40 border border-on-background/5"></div>
