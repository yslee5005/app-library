<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>증상 기록 - BabyLetter</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                "surface-container-high": "#ffe2d9",
                "secondary-fixed": "#ffe087",
                "tertiary-fixed": "#b4fdb4",
                "outline": "#a26e5b",
                "secondary-dim": "#665100",
                "secondary-fixed-dim": "#fad04b",
                "surface-container-low": "#fff1ec",
                "on-error-container": "#6e0523",
                "primary-fixed": "#f8847b",
                "surface-container-lowest": "#ffffff",
                "primary-fixed-dim": "#e8786e",
                "surface-variant": "#ffdbce",
                "tertiary": "#286c34",
                "on-secondary": "#fff8ee",
                "on-primary-container": "#540809",
                "tertiary-dim": "#1a5f29",
                "outline-variant": "#dfa48f",
                "on-tertiary-fixed": "#03501b",
                "on-tertiary-fixed-variant": "#2a6e35",
                "on-surface-variant": "#835342",
                "surface-container": "#ffe9e2",
                "on-primary-fixed": "#170000",
                "on-primary": "#fff7f6",
                "inverse-on-surface": "#b89589",
                "error": "#a8364b",
                "surface-container-highest": "#ffdbce",
                "on-secondary-fixed": "#4e3d00",
                "on-primary-fixed-variant": "#611211",
                "error-dim": "#6b0221",
                "error-container": "#f97386",
                "background": "#fff8f6",
                "surface-bright": "#fff8f6",
                "primary-dim": "#90352f",
                "primary": "#9f403a",
                "on-tertiary-container": "#1f632c",
                "primary-container": "#f8847b",
                "surface-tint": "#9f403a",
                "inverse-surface": "#1b0904",
                "on-secondary-container": "#644f00",
                "tertiary-fixed-dim": "#a6eea7",
                "secondary": "#745c00",
                "on-error": "#fff7f7",
                "on-surface": "#4e2819",
                "on-secondary-fixed-variant": "#705900",
                "inverse-primary": "#f8847b",
                "surface": "#fff8f6",
                "on-tertiary": "#e9ffe4",
                "surface-dim": "#ffd0bf",
                "secondary-container": "#ffe087",
                "on-background": "#4e2819",
                "tertiary-container": "#b4fdb4"
            },
            "borderRadius": {
                "DEFAULT": "0.25rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "full": "9999px"
            },
            "fontFamily": {
                "headline": ["Plus Jakarta Sans"],
                "body": ["Inter"],
                "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; background-color: #FFF8E1; }
        .font-headline { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-background min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 bg-[#FFF8E1] dark:bg-stone-950 flex items-center px-5 py-3">
<div class="flex items-center w-full relative">
<button class="text-[#FF8A80] transition-transform active:scale-95 duration-200">
<span class="material-symbols-outlined" style="font-size: 28px;">arrow_back</span>
</button>
<h1 class="absolute left-1/2 -translate-x-1/2 font-headline font-bold text-[#3E2723] text-lg">Symptom Log</h1>
</div>
</header>
<main class="pt-16 px-5 space-y-8 max-w-2xl mx-auto">
<!-- Today's Symptoms Section -->
<section class="space-y-4 pt-4">
<div class="flex justify-between items-center">
<h2 class="font-headline font-bold text-[#3E2723] text-xl">오늘의 증상</h2>
<button class="text-[#FF8A80] text-sm font-medium flex items-center gap-1 transition-transform active:scale-95">
<span class="material-symbols-outlined text-[18px]">add</span>
                    직접 입력하기
                </button>
</div>
<!-- Symptom Grid -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-3">
<button class="flex items-center justify-center gap-2 p-3 bg-white border border-transparent rounded-2xl shadow-[0_2px_8px_rgba(62,39,35,0.05)] transition-all active:scale-95 border-primary-container bg-primary-container/10">
<span class="text-lg">🤢</span>
<span class="text-sm font-medium text-[#3E2723]">입덧</span>
</button>
<button class="flex items-center justify-center gap-2 p-3 bg-white border border-transparent rounded-2xl shadow-[0_2px_8px_rgba(62,39,35,0.05)] transition-all active:scale-95">
<span class="text-lg">😣</span>
<span class="text-sm font-medium text-[#3E2723]">허리 통증</span>
</button>
<button class="flex items-center justify-center gap-2 p-3 bg-white border border-transparent rounded-2xl shadow-[0_2px_8px_rgba(62,39,35,0.05)] transition-all active:scale-95 border-primary-container bg-primary-container/10">
<span class="text-lg">🦶</span>
<span class="text-sm font-medium text-[#3E2723]">부종</span>
</button>
<button class="flex items-center justify-center gap-2 p-3 bg-white border border-transparent rounded-2xl shadow-[0_2px_8px_rgba(62,39,35,0.05)] transition-all active:scale-95">
<span class="text-lg">🤕</span>
<span class="text-sm font-medium text-[#3E2723]">두통</span>
</button>
<button class="flex items-center justify-center gap-2 p-3 bg-white border border-transparent rounded-2xl shadow-[0_2px_8px_rgba(62,39,35,0.05)] transition-all active:scale-95">
<span class="text-lg">😴</span>
<span class="text-sm font-medium text-[#3E2723]">피로</span>
</button>
<button class="flex items-center justify-center gap-2 p-3 bg-white border border-transparent rounded-2xl shadow-[0_2px_8px_rgba(62,39,35,0.05)] transition-all active:scale-95">
<span class="text-lg">🔥</span>
<span class="text-sm font-medium text-[#3E2723]">속쓰림</span>
</button>
<button class="flex items-center justify-center gap-2 p-3 bg-white border border-transparent rounded-2xl shadow-[0_2px_8px_rgba(62,39,35,0.05)] transition-all active:scale-95">
<span class="text-lg">🚽</span>
<span class="text-sm font-medium text-[#3E2723]">빈뇨</span>
</button>
<button class="flex items-center justify-center gap-2 p-3 bg-white border border-transparent rounded-2xl shadow-[0_2px_8px_rgba(62,39,35,0.05)] transition-all active:scale-95">
<span class="text-lg">🌙</span>
<span class="text-sm font-medium text-[#3E2723]">불면</span>
</button>
</div>
</section>
<!-- Symptom Intensity Section (Dynamic Visibility Simulation) -->
<section class="space-y-4">
<h2 class="font-headline font-bold text-[#3E2723] text-xl">증상 강도</h2>
<div class="space-y-6">
<!-- Intensity Item 1 -->
<div class="bg-white/60 p-5 rounded-3xl space-y-4 border border-white/40">
<div class="flex items-center gap-2">
<span class="text-lg">🤢</span>
<span class="font-semibold text-[#3E2723]">입덧</span>
</div>
<div class="relative pt-2">
<input class="w-full h-1.5 bg-[#8D6E63]/20 rounded-lg appearance-none cursor-pointer accent-[#FF8A80]" max="5" min="1" type="range" value="3"/>
<div class="flex justify-between mt-2 px-1">
<span class="text-[10px] text-[#8D6E63] font-medium">가벼움</span>
<span class="text-[10px] text-[#8D6E63] font-medium">보통</span>
<span class="text-[10px] text-[#8D6E63] font-medium">심함</span>
</div>
</div>
</div>
<!-- Intensity Item 2 -->
<div class="bg-white/60 p-5 rounded-3xl space-y-4 border border-white/40">
<div class="flex items-center gap-2">
<span class="text-lg">🦶</span>
<span class="font-semibold text-[#3E2723]">부종</span>
</div>
<div class="relative pt-2">
<input class="w-full h-1.5 bg-[#8D6E63]/20 rounded-lg appearance-none cursor-pointer accent-[#FF8A80]" max="5" min="1" type="range" value="2"/>
<div class="flex justify-between mt-2 px-1">
<span class="text-[10px] text-[#8D6E63] font-medium">가벼움</span>
<span class="text-[10px] text-[#8D6E63] font-medium">보통</span>
<span class="text-[10px] text-[#8D6E63] font-medium">심함</span>
</div>
</div>
</div>
</div>
</section>
<!-- Additional Note Section -->
<section class="space-y-3">
<h2 class="font-headline font-bold text-[#3E2723] text-xl">추가 메모</h2>
<textarea class="w-full bg-white border-none rounded-3xl p-5 text-[#3E2723] placeholder-[#8D6E63]/50 focus:ring-2 focus:ring-[#FF8A80]/50 shadow-[0_2px_8px_rgba(62,39,35,0.05)] resize-none" placeholder="추가 메모..." rows="4"></textarea>
</section>
<!-- Reassurance Message -->
<section class="bg-primary-container/20 p-5 rounded-3xl border border-primary-container/30 flex items-start gap-4">
<span class="material-symbols-outlined text-[#FF8A80] mt-1" style="font-variation-settings: 'FILL' 1;">favorite</span>
<p class="text-[#3E2723] font-medium text-sm leading-relaxed">
                이런 증상은 임신 중 자연스러운 변화예요 💛<br/>
<span class="text-[#8D6E63] font-normal text-xs">아이와 엄마 모두 건강해지는 과정이니 너무 걱정 마세요.</span>
</p>
</section>
<!-- Weekly Symptom Flow (Heatmap) -->
<section class="space-y-4">
<h2 class="font-headline font-bold text-[#3E2723] text-xl">이번 주 증상 흐름</h2>
<div class="bg-white p-6 rounded-3xl shadow-[0_2px_8px_rgba(62,39,35,0.05)]">
<div class="grid grid-cols-7 gap-2">
<!-- Days Labels -->
<span class="text-center text-[11px] text-[#8D6E63] font-bold">월</span>
<span class="text-center text-[11px] text-[#8D6E63] font-bold">화</span>
<span class="text-center text-[11px] text-[#8D6E63] font-bold">수</span>
<span class="text-center text-[11px] text-[#8D6E63] font-bold">목</span>
<span class="text-center text-[11px] text-[#8D6E63] font-bold">금</span>
<span class="text-center text-[11px] text-[#8D6E63] font-bold">토</span>
<span class="text-center text-[11px] text-[#8D6E63] font-bold">일</span>
<!-- Heatmap Grid -->
<div class="aspect-square rounded-lg bg-[#FF8A80]/10 flex items-center justify-center text-[10px] text-[#FF8A80]/60">12</div>
<div class="aspect-square rounded-lg bg-[#FF8A80]/40 flex items-center justify-center text-[10px] text-white">13</div>
<div class="aspect-square rounded-lg bg-[#FF8A80]/80 flex items-center justify-center text-[10px] text-white">14</div>
<div class="aspect-square rounded-lg bg-[#FF8A80]/20 flex items-center justify-center text-[10px] text-[#FF8A80]/60">15</div>
<div class="aspect-square rounded-lg bg-surface-container-low border border-dashed border-[#8D6E63]/20 flex items-center justify-center text-[10px] text-[#8D6E63]">16</div>
<div class="aspect-square rounded-lg bg-[#FF8A80] flex items-center justify-center text-[10px] text-white ring-4 ring-[#FF8A80]/20">17</div>
<div class="aspect-square rounded-lg bg-surface-container-low border border-dashed border-[#8D6E63]/20 flex items-center justify-center text-[10px] text-[#8D6E63]">18</div>
</div>
<div class="flex justify-end mt-4 gap-4 items-center">
<span class="text-[10px] text-[#8D6E63]">쾌적함</span>
<div class="flex gap-1">
<div class="w-3 h-3 rounded-sm bg-[#FF8A80]/10"></div>
<div class="w-3 h-3 rounded-sm bg-[#FF8A80]/40"></div>
<div class="w-3 h-3 rounded-sm bg-[#FF8A80]/80"></div>
<div class="w-3 h-3 rounded-sm bg-[#FF8A80]"></div>
</div>
<span class="text-[10px] text-[#8D6E63]">불편함</span>
</div>
</div>
</section>
</main>
<!-- Floating Record Button Area -->
<div class="fixed bottom-24 left-0 w-full px-5 pointer-events-none">
<button class="pointer-events-auto w-full py-4 bg-[#FF8A80] text-white font-headline font-bold rounded-2xl shadow-lg shadow-[#FF8A80]/30 transition-transform active:scale-[0.98]">
            기록 저장하기
        </button>
</div>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-white/90 dark:bg-stone-900/90 backdrop-blur-md z-50 rounded-t-3xl shadow-[0_-2px_10px_rgba(62,39,35,0.08)] border-t border-[#3E2723]/5">
<button class="flex flex-col items-center justify-center text-[#8D6E63] px-4 py-1 hover:opacity-80 transition-all duration-300">
<span class="material-symbols-outlined" data-icon="mail">mail</span>
<span class="font-headline text-[10px] font-medium">Letters</span>
</button>
<button class="flex flex-col items-center justify-center text-[#8D6E63] px-4 py-1 hover:opacity-80 transition-all duration-300">
<span class="material-symbols-outlined" data-icon="child_care">child_care</span>
<span class="font-headline text-[10px] font-medium">Growth</span>
</button>
<button class="flex flex-col items-center justify-center bg-[#FF8A80]/10 text-[#FF8A80] rounded-2xl px-4 py-1 hover:opacity-80 transition-all duration-300">
<span class="material-symbols-outlined" data-icon="monitor_heart" style="font-variation-settings: 'FILL' 1;">monitor_heart</span>
<span class="font-headline text-[10px] font-medium">Symptoms</span>
</button>
<button class="flex flex-col items-center justify-center text-[#8D6E63] px-4 py-1 hover:opacity-80 transition-all duration-300">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-headline text-[10px] font-medium">Settings</span>
</button>
</nav>
</body></html>
