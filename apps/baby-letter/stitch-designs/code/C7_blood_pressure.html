<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>

      tailwind.config = {
        darkMode: "class",
        theme: { extend: { "colors": { "on-tertiary-fixed-variant": "#2a6e35", "secondary": "#745c00", "primary-dim": "#90352f", "on-secondary-fixed-variant": "#705900", "tertiary-fixed-dim": "#a6eea7", "inverse-primary": "#f8847b", "tertiary-container": "#b4fdb4", "on-secondary": "#fff8ee", "surface-dim": "#ffd0bf", "on-surface": "#4e2819", "surface-bright": "#fff8f6", "on-error": "#fff7f7", "inverse-surface": "#1b0904", "secondary-fixed-dim": "#fad04b", "error-dim": "#6b0221", "tertiary-dim": "#1a5f29", "on-primary-fixed": "#170000", "primary-container": "#f8847b", "tertiary-fixed": "#b4fdb4", "on-tertiary-fixed": "#03501b", "primary-fixed-dim": "#e8786e", "primary": "#9f403a", "tertiary": "#286c34", "on-secondary-fixed": "#4e3d00", "surface-container-highest": "#ffdbce", "surface-container-high": "#ffe2d9", "inverse-on-surface": "#b89589", "on-tertiary-container": "#1f632c", "on-error-container": "#6e0523", "on-primary-fixed-variant": "#611211", "surface-variant": "#ffdbce", "surface-container-lowest": "#ffffff", "surface": "#fff8f6", "on-primary": "#fff7f6", "on-tertiary": "#e9ffe4", "outline-variant": "#dfa48f", "secondary-fixed": "#ffe087", "outline": "#a26e5b", "error": "#a8364b", "surface-container": "#ffe9e2", "on-primary-container": "#540809", "surface-tint": "#9f403a", "background": "#fff8f6", "on-surface-variant": "#835342", "secondary-dim": "#665100", "primary-fixed": "#f8847b", "on-background": "#4e2819", "surface-container-low": "#fff1ec", "error-container": "#f97386", "on-secondary-container": "#644f00", "secondary-container": "#ffe087" }, "borderRadius": { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" }, "fontFamily": { "headline": ["Plus Jakarta Sans"], "body": ["Inter"], "label": ["Inter"] } } } }

        body { background-color: #FFF8E1; font-family: 'Inter', sans-serif; }

</head>
<body class="text-on-surface antialiased min-h-screen pb-32">
<header class="fixed top-0 w-full z-50 flex items-center px-4 h-16 bg-orange-50 border-b border-orange-100 shadow-sm">
<button class="w-10 h-10 flex items-center justify-center rounded-full text-rose-400"><span class="material-symbols-outlined">arrow_back</span></button>
<h1 class="flex-1 text-center font-['Plus_Jakarta_Sans'] font-bold text-lg text-rose-400">혈압 기록</h1>
<div class="w-10"></div>
</header>
<main class="mt-20 px-5 space-y-6">
<div class="bg-white rounded-xl p-4 shadow-[0_2px_8px_rgba(62,39,35,0.08)] border-l-4 border-amber-300">
<div class="flex items-start gap-3">
<div class="w-10 h-10 rounded-full overflow-hidden bg-orange-100 flex-shrink-0">
<img class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDZwNwW2GULpPDKrKW1S3-xCuzPpAC4Li7xlMDiHLI0skcXvJ4_F7aTJpNIlqfek9vBf33mWgQCUUiC1iHGXYiFn40F6MlJ9IxGHuayb0BnXkdH_wgACfPZL3DH2YGWE4LO27AP9Ul7xQ8LiVpUf3RUsjeZPbpXXA3FPPQTpav24h95seJQ0ntoHnH9gQ-M8kcSMjWZ1iUx6oU3Q_q1-7Zkjgy8Md0O9nYA36Z-iz5eTgbDrIZkNC6t6p_VlR-vHv7qZFvnxZfIpfRx"/>
</div>
<p class="text-sm font-medium text-secondary italic">"엄마, 오늘의 우리 건강 수치는 어떤가요?"</p>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="bg-white rounded-2xl p-6 shadow-[0_2px_8px_rgba(62,39,35,0.08)] flex flex-col items-center justify-center aspect-square border-4 border-rose-100">
<span class="text-xs font-semibold text-secondary uppercase tracking-wider mb-2">수축기</span>
<div class="text-4xl font-black headline-font text-primary leading-none">120</div>
<span class="text-[10px] text-outline mt-1 font-medium">mmHg</span>
</div>
<div class="bg-white rounded-2xl p-6 shadow-[0_2px_8px_rgba(62,39,35,0.08)] flex flex-col items-center justify-center aspect-square border-4 border-sky-100">
<span class="text-xs font-semibold text-secondary uppercase tracking-wider mb-2">이완기</span>
<div class="text-4xl font-black headline-font text-sky-500 leading-none">80</div>
<span class="text-[10px] text-outline mt-1 font-medium">mmHg</span>
</div>
</div>
<div class="bg-white rounded-xl p-5 shadow-[0_2px_8px_rgba(62,39,35,0.08)] flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-rose-50 flex items-center justify-center text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
<div>
<div class="text-[10px] text-outline font-bold">맥박</div>
<div class="text-xl font-bold headline-font">72 <span class="text-xs font-medium text-outline">bpm</span></div>
</div>
</div>
<div class="px-4 py-2 bg-on-tertiary-container/10 rounded-full">
<span class="text-sm font-bold text-on-tertiary-fixed-variant flex items-center gap-1">
<span class="material-symbols-outlined text-[18px]">check_circle</span> 정상 범위</span>
</div>
</div>
<div class="bg-white rounded-xl p-5 shadow-[0_2px_8px_rgba(62,39,35,0.08)] space-y-4">
<h3 class="font-bold headline-font text-on-surface">혈압 추이 (최근 7일)</h3>
<div class="h-40 w-full relative flex items-end justify-between px-2 pt-8 border-b border-l border-surface-container">
<div class="absolute inset-0 top-8 px-2 flex items-center justify-center">
<svg class="w-full h-full" preserveaspectratio="none" viewbox="0 0 100 40">
<rect fill="#81C784" fill-opacity="0.1" height="15" width="100" x="0" y="10"></rect>
<path d="M0,15 L20,12 L40,18 L60,14 L80,12 L100,10" fill="none" stroke="#FF8A80" stroke-width="2"></path>
<path d="M0,30 L20,28 L40,32 L60,29 L80,31 L100,28" fill="none" stroke="#64B5F6" stroke-width="2"></path>
</svg>
</div>
<span class="text-[10px] text-outline">05/01</span>
<span class="text-[10px] text-outline">05/03</span>
<span class="text-[10px] text-outline">05/05</span>
<span class="text-[10px] text-outline">오늘</span>
</div>
</div>
<div class="bg-error-container/20 border border-error-container/30 rounded-xl p-4 flex items-center gap-3">
<span class="material-symbols-outlined text-error">info</span>
<p class="text-xs text-on-error-container font-medium leading-relaxed">수축기 140+ 또는 이완기 90+ 시 의사 상담을 권해요.</p>
</div>
</main>
<div class="fixed bottom-20 left-0 w-full px-5 py-4 bg-gradient-to-t from-[#FFF8E1] via-[#FFF8E1]/90 to-transparent">
<button class="w-full h-14 bg-primary text-on-primary rounded-xl font-bold headline-font shadow-lg flex items-center justify-center gap-2">
<span class="material-symbols-outlined">save</span> 기록 저장하기</button>
</div>
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center bg-white border-t border-orange-50 px-6 py-3 pb-safe shadow-[0_-2px_10px_rgba(62,39,35,0.05)] rounded-t-2xl">
<div class="flex flex-col items-center text-stone-400"><span class="material-symbols-outlined">mail</span><span class="text-[11px] font-medium">편지</span></div>
<div class="flex flex-col items-center text-stone-400"><span class="material-symbols-outlined">child_care</span><span class="text-[11px] font-medium">성장</span></div>
<div class="flex flex-col items-center text-rose-500 font-semibold"><span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">edit_note</span><span class="text-[11px]">기록</span></div>
<div class="flex flex-col items-center text-stone-400"><span class="material-symbols-outlined">settings</span><span class="text-[11px] font-medium">설정</span></div>
</nav>
