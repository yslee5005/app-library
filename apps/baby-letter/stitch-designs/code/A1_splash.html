<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .watercolor-blur {
            filter: blur(40px);
            opacity: 0.4;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-[#FFF8E1] font-body text-[#3E2723] overflow-hidden min-h-screen flex flex-col items-center justify-between">
<!-- Ambient Background Effects -->
<div class="fixed inset-0 z-0 pointer-events-none">
<div class="absolute top-[-10%] right-[-10%] w-[60%] h-[40%] bg-[#FFD54F] rounded-full watercolor-blur"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-[50%] h-[35%] bg-[#FF8A80] rounded-full watercolor-blur"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 flex-1 flex flex-col items-center justify-center w-full px-10">
<!-- Illustration Container -->
<div class="relative mb-8 flex items-center justify-center">
<!-- Floating Elements -->
<div class="absolute -top-12 -right-4 text-[#FF8A80] opacity-80 animate-bounce" style="animation-duration: 3s;">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
<div class="absolute -top-4 -left-8 text-[#FFD54F] opacity-70 animate-pulse" style="animation-duration: 4s;">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<div class="absolute -bottom-2 -right-10 text-[#FFD54F] opacity-60">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">colors_spark</span>
</div>
<!-- Main Envelope Illustration -->
<div class="relative w-48 h-48 md:w-64 md:h-64 flex items-center justify-center">
<div class="absolute inset-0 bg-[#FF8A80] rounded-xl shadow-xl transform rotate-3"></div>
<div class="relative w-full h-full flex items-center justify-center bg-white/10 backdrop-blur-sm rounded-xl border-4 border-white/40 overflow-hidden">
<img alt="BabyLetter Envelope" class="w-3/4 h-3/4 object-contain" data-alt="Soft watercolor illustration of a coral pink envelope partially open with small golden sparkles and tiny hearts floating out into a warm cream background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAUeZlbkKN2m7f6Ffn6l5_lrfHokTBZ7ATW0O7-1Gxte5Qndbo7dvWpnWawAN7itQJEDqbqI6DNLA0mNE-wu0B1J0wbi_tD9sG7W0eLsWabf8it9Z9XdzkRa0pQEeDxorbA2pZV9QwW2LOvZsI0K6F7HQ-hbathomymM8LvxrHMN2P_TzBhHrZAEBAwf2aS179vWK3odVgLSGt58PfYwAedS8z1tRMNI7DnZBWFNVfW7vElyCLLeGQS-MSiKNNbHGtWassz5ouhIjfX"/>
</div>
</div>
</div>
<!-- Branding -->
<div class="text-center space-y-3">
<h1 class="font-headline font-bold text-4xl md:text-5xl tracking-tight text-[#3E2723]">
                아기의 편지
            </h1>
<p class="font-body text-[#8D6E63] text-lg md:text-xl font-medium">
                아기가 보내는 사랑의 편지
            </p>
</div>
</main>
<!-- Bottom Loading Section -->
<footer class="relative z-10 w-full pb-16 flex flex-col items-center space-y-6">
<!-- Subtle Loading Indicator -->
<div class="flex space-x-2">
<div class="w-2 h-2 rounded-full bg-[#FF8A80] opacity-30 animate-pulse"></div>
<div class="w-2 h-2 rounded-full bg-[#FF8A80] opacity-60 animate-pulse" style="animation-delay: 0.2s;"></div>
<div class="w-2 h-2 rounded-full bg-[#FF8A80] animate-pulse" style="animation-delay: 0.4s;"></div>
</div>
<!-- Tagline -->
<div class="flex items-center space-y-1 flex-col">
<span class="text-[10px] font-bold tracking-widest uppercase text-[#8D6E63]/40">BABYLETTER</span>
</div>
</footer>
