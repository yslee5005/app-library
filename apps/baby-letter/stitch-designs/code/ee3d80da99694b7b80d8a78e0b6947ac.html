<body class="min-h-screen pb-24">
<!-- TopAppBar (Shared Component) -->

<h1 class="font-['Plus_Jakarta_Sans'] font-bold text-[#3E2723] text-lg tracking-tight">기록</h1>
</div>
<div class="flex items-center gap-2">
<span class="bg-[#FF8A80] text-white text-[11px] font-bold px-3 py-1 rounded-full shadow-sm">D+45</span>
<span class="bg-white/80 backdrop-blur-sm text-[#FF8A80] text-[11px] font-bold px-3 py-1 rounded-full border border-[#FF8A80]/20 flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
                14일
            </span>
</div>
</header>
<main class="pt-20 px-5 space-y-6">
<!-- Today's Summary Card -->
<section class="bg-white rounded-[24px] p-6 shadow-[0_2px_12px_rgba(62,39,35,0.06)] relative overflow-hidden">
<div class="absolute top-0 right-0 p-4 opacity-10">
<span class="material-symbols-outlined text-5xl">auto_awesome</span>
</div>
<div class="flex justify-between items-center mb-6">
<h2 class="text-[#3E2723] font-bold text-lg font-headline">오늘의 우리 아기</h2>
<span class="text-[#8D6E63] text-xs font-medium">10월 24일</span>
</div>
<div class="flex justify-between items-start mb-8">
<!-- Feeding Progress -->
<div class="flex flex-col items-center flex-1">
<div class="relative w-16 h-16 flex items-center justify-center">
<svg class="w-full h-full">
<circle class="text-[#f1f1f1]" cx="32" cy="32" fill="transparent" r="28" stroke="currentColor" stroke-width="6"></circle>
<circle class="text-[#FF8A80] progress-ring-circle" cx="32" cy="32" fill="transparent" r="28" stroke="currentColor" stroke-dasharray="175.9" stroke-dashoffset="35.1" stroke-linecap="round" stroke-width="6"></circle>
</svg>
<span class="absolute text-[13px] font-bold text-[#3E2723]">8/10</span>

</div>
<!-- Sleep Progress -->

<circle class="text-[#f1f1f1]" cx="32" cy="32" fill="transparent" r="28" stroke="currentColor" stroke-width="6"></circle>
<circle class="text-[#9C27B0]/60 progress-ring-circle" cx="32" cy="32" fill="transparent" r="28" stroke="currentColor" stroke-dasharray="175.9" stroke-dashoffset="19.3" stroke-linecap="round" stroke-width="6"></circle>
</svg>
<span class="absolute text-[11px] font-bold text-[#3E2723]">14.2h</span>
</div>
<span class="text-[12px] font-bold mt-2 text-[#3E2723]">수면</span>
<span class="text-[10px] text-[#9C27B0]/70 font-medium">잘 자고 있어요</span>
</div>
<!-- Diaper Progress -->
<div class="flex flex-col items-center flex-1">

<svg class="w-full h-full">
<circle class="text-[#f1f1f1]" cx="32" cy="32" fill="transparent" r="28" stroke="currentColor" stroke-width="6"></circle>
<circle class="text-[#81C784] progress-ring-circle" cx="32" cy="32" fill="transparent" r="28" stroke="currentColor" stroke-dasharray="175.9" stroke-dashoffset="44" stroke-linecap="round" stroke-width="6"></circle>
</svg>
<span class="absolute text-[13px] font-bold text-[#3E2723]">6/8</span>
</div>

<span class="text-[10px] text-[#81C784] font-medium">정상 범위</span>
</div>
</div>
<div class="bg-[#F1F8E9] rounded-xl py-3 px-4 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[#81C784] text-lg" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<p class="text-[#2E7D32] text-[13px] font-medium leading-tight">콩이가 건강하게 자라고 있어요</p>

</div>
<div class="text-center">
<p class="text-[13px] font-bold text-[#3E2723]">수유</p>

</div>
</button>
<!-- Sleep -->

<div class="w-[70px] h-[70px] rounded-2xl bg-[#FFF8E1] flex items-center justify-center shadow-sm group-hover:shadow-md transition-shadow">
<span class="material-symbols-outlined text-[#FFD54F] text-3xl">edit_note</span>
</div>
<div class="text-center">
<p class="text-[13px] font-bold text-[#3E2723]">메모</p>
</div>
</button>

<div class="w-[70px] h-[70px] rounded-2xl bg-[#FFEBEE] flex items-center justify-center shadow-sm group-hover:shadow-md transition-shadow">
<span class="material-symbols-outlined text-[#EF5350] text-3xl">medical_services</span>
</div>
<div class="text-center">
<p class="text-[13px] font-bold text-[#3E2723]">약/비타민</p>
</div>
</button>
<!-- Temp -->

<div class="w-[70px] h-[70px] rounded-2xl bg-[#FFF3E0] flex items-center justify-center shadow-sm group-hover:shadow-md transition-shadow">
<span class="material-symbols-outlined text-[#FF8A80] text-3xl">thermostat</span>

<div class="text-center">
<p class="text-[13px] font-bold text-[#3E2723]">체온</p>

</div>
</div>

<span class="font-['Plus_Jakarta_Sans'] font-medium text-[11px]">설정</span>

<button class="fixed bottom-24 right-6 w-14 h-14 bg-[#FF8A80] text-white rounded-full shadow-lg shadow-[#FF8A80]/30 flex items-center justify-center active:scale-90 transition-transform">
