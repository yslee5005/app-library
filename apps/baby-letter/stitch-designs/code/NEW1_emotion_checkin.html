<div class="flex items-center gap-3">

<main class="flex-grow flex flex-col px-5 pt-8 pb-32 max-w-md mx-auto w-full">

<div class="mb-10 text-center">
<h1 class="font-headline font-extrabold text-2xl mb-2 text-[#3E2723]">💛 오늘의 한마디</h1>
<p class="text-[#8D6E63] font-medium">솔직하게 선택해도 괜찮아요</p>
</div>
<!-- Emotion Grid -->
<div class="flex justify-between items-center mb-10">
<!-- Selected State: 좋아 -->
<div class="flex flex-col items-center gap-3">
<div class="relative transition-transform duration-200 active:scale-95">
<button class="w-20 h-20 rounded-full bg-[#81C784]/20 flex items-center justify-center text-4xl border-4 border-[#FF8A80] shadow-lg ring-4 ring-[#FF8A80]/10">
                        😊
                    </button>
<div class="absolute -top-1 -right-1 bg-[#FF8A80] text-white rounded-full w-6 h-6 flex items-center justify-center shadow-md">
<span class="material-symbols-outlined text-xs" style="font-variation-settings: 'wght' 700">check</span>
</div>
</div>
<span class="font-headline font-bold text-[#FF8A80]">좋아</span>
</div>
<!-- 그냥 -->
<div class="flex flex-col items-center gap-3">
<button class="w-20 h-20 rounded-full bg-[#FFD54F]/20 flex items-center justify-center text-4xl transition-transform duration-200 active:scale-95 hover:bg-[#FFD54F]/30">
                    😐
                </button>
<span class="font-headline font-medium text-[#8D6E63]">그냥</span>
</div>
<!-- 지침 -->
<div class="flex flex-col items-center gap-3">
<button class="w-20 h-20 rounded-full bg-[#64B5F6]/20 flex items-center justify-center text-4xl transition-transform duration-200 active:scale-95 hover:bg-[#64B5F6]/30">
                    😢
                </button>
<span class="font-headline font-medium text-[#8D6E63]">지침</span>
</div>
<!-- 힘들어 -->
<div class="flex flex-col items-center gap-3">
<button class="w-20 h-20 rounded-full bg-[#EF5350]/20 flex items-center justify-center text-4xl transition-transform duration-200 active:scale-95 hover:bg-[#EF5350]/30">
                    😤
                </button>
<span class="font-headline font-medium text-[#8D6E63]">힘들어</span>
</div>
</div>
<!-- Optional Input -->
<div class="mb-8">
<textarea class="w-full bg-white border-none rounded-xl p-4 text-[#3E2723] placeholder-[#8D6E63]/50 focus:ring-2 focus:ring-[#FF8A80]/20 shadow-[0_2px_8px_rgba(62,39,35,0.05)] h-24 resize-none transition-all" placeholder="한마디 더 하고 싶다면..."></textarea>
</div>

<div class="flex-grow">
<p class="text-sm font-bold text-[#3E2723]">💬 파트너의 오늘: 😊 기분 좋대요!</p>
<p class="text-[10px] text-[#8D6E63] mt-1">오후 2:30</p>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col gap-4">
<button class="w-full bg-[#FF8A80] text-white font-headline font-bold py-4 rounded-xl shadow-[0_4px_12px_rgba(255,138,128,0.3)] hover:opacity-90 active:scale-[0.98] transition-all">

<button class="w-full py-2 text-[#8D6E63] font-medium text-sm hover:text-[#3E2723] transition-colors">

</div>

<p class="mt-8 text-center text-xs text-[#8D6E63] font-medium opacity-70">

<div class="flex flex-col items-center justify-center text-[#8D6E63] dark:text-stone-400 font-medium transition-all duration-300 hover:bg-[#FFF8E1] dark:hover:bg-stone-800 rounded-full px-2 py-1">
<span class="material-symbols-outlined" data-icon="Child_Care">child_care</span>

<div class="flex flex-col items-center justify-center text-[#8D6E63] dark:text-stone-400 font-medium transition-all duration-300 hover:bg-[#FFF8E1] dark:hover:bg-stone-800 rounded-full px-2 py-1">
<span class="material-symbols-outlined" data-icon="group">group</span>
<span class="font-['Plus_Jakarta_Sans'] text-xs">Family</span>
