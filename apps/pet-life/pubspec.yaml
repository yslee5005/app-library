name: pet_life
description: Pet Life — 말 못하는 반려견의 상태를 대변하는 앱
version: 1.0.0
publish_to: none

environment:
  sdk: ^3.7.0
  flutter: ">=3.29.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  go_router: ^15.1.2
  lottie: ^3.0.0
  share_plus: ^10.0.0
  shared_preferences: ^2.5.0
  intl: ^0.20.0

  # App Library packages
  app_lib_core:
  app_lib_theme:
  app_lib_ui_kit:
  app_lib_cache:
  app_lib_notifications:
  app_lib_l10n:

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/animations/

dev_dependencies:
  flutter_test:
    sdk: flutter
