name: claude_code_learn
description: "Claude Code Learn - Interactive learning app"
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.11.4

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ">=3.0.0 <3.2.0"
  go_router: ^15.1.2
  markdown_widget: ^2.3.2
  shared_preferences: ^2.3.5
  path_provider: ^2.1.0
  google_fonts: ^6.2.1
  collection: ^1.18.0

  # Shared packages
  app_lib_core:
  app_lib_theme:
  app_lib_gamification:

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/content/guide/
    - assets/content/guide/에이전틱-루프/
    - assets/content/deep-dive/
    - assets/content/getting-started/
    - assets/content/concepts/
    - assets/content/configuration/
    - assets/content/guides/
    - assets/content/reference/commands/
    - assets/content/reference/sdk/
    - assets/content/reference/tools/
